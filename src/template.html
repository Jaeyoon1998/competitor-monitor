<title>경쟁사 이벤트 · 프로모션 모니터</title>

<style>
  /* ── 토큰 ─────────────────────────────────────────────
     중립색은 살짝 청록 쪽으로 기울여 계기판 느낌을 준다.
     시리즈 색은 검증된 카테고리 팔레트 5슬롯. */
  :root {
    color-scheme: light;
    --page:        #f4f6f6;
    --surface:     #fbfcfc;
    --surface-2:   #edf1f0;
    --ink:         #101413;
    --ink-2:       #4b5250;
    --ink-muted:   #838a88;
    --grid:        #e4e8e7;
    --rule:        #d3d9d8;
    --border:      rgba(16, 20, 19, 0.11);
    --shadow:      0 1px 2px rgba(16, 20, 19, 0.05), 0 8px 24px rgba(16, 20, 19, 0.06);

    --s-event:     #2a78d6;
    --s-promo:     #eb6834;
    --s-update:    #1baf7a;
    --s-collab:    #eda100;
    --s-marketing: #e87ba4;

    --good:        #0ca30c;
    --warning:     #fab219;

    --day-w:   24px;
    --label-w: 268px;

    --sans: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    --mono: ui-monospace, "Cascadia Mono", "Consolas", "D2Coding", monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --page:        #0c0f0f;
      --surface:     #171b1b;
      --surface-2:   #212726;
      --ink:         #eef2f1;
      --ink-2:       #b9c0be;
      --ink-muted:   #838a88;
      --grid:        #252b2a;
      --rule:        #343a39;
      --border:      rgba(255, 255, 255, 0.11);
      --shadow:      0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.34);

      --s-event:     #3987e5;
      --s-promo:     #d95926;
      --s-update:    #199e70;
      --s-collab:    #c98500;
      --s-marketing: #d55181;
    }
  }

  :root[data-theme="dark"] {
    color-scheme: dark;
    --page:        #0c0f0f;
    --surface:     #171b1b;
    --surface-2:   #212726;
    --ink:         #eef2f1;
    --ink-2:       #b9c0be;
    --ink-muted:   #838a88;
    --grid:        #252b2a;
    --rule:        #343a39;
    --border:      rgba(255, 255, 255, 0.11);
    --shadow:      0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.34);

    --s-event:     #3987e5;
    --s-promo:     #d95926;
    --s-update:    #199e70;
    --s-collab:    #c98500;
    --s-marketing: #d55181;
  }

  /* ── 기본 ──────────────────────────────────────────── */
  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  a { color: inherit; }
  :focus-visible { outline: 2px solid var(--s-event); outline-offset: 2px; border-radius: 3px; }

  .eyebrow {
    font-size: 11px;
    font-weight: 650;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  /* ── 헤더 ──────────────────────────────────────────── */
  header { display: flex; flex-direction: column; gap: 6px; }
  h1 {
    margin: 0;
    font-size: 27px;
    font-weight: 640;
    letter-spacing: -0.02em;
    text-wrap: balance;
  }
  .meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-2);
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
  }

  /* ── 스탯 타일 ─────────────────────────────────────── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(168px, 1fr));
    gap: 12px;
  }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px 15px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    box-shadow: var(--shadow);
  }
  .tile-v { font-size: 28px; font-weight: 640; letter-spacing: -0.02em; line-height: 1.15; }
  .tile-k { font-size: 12px; color: var(--ink-2); }
  .tile-n { font-size: 11px; color: var(--ink-muted); font-family: var(--mono); }

  /* ── 컨트롤 ────────────────────────────────────────── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 10px;
    padding-bottom: 2px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 13px 5px 10px;
    font: inherit;
    font-size: 12.5px;
    color: var(--ink-2);
    cursor: pointer;
    transition: background 120ms, color 120ms, border-color 120ms;
  }
  .chip:hover { background: var(--surface-2); }
  .chip[aria-pressed="true"] { color: var(--ink); border-color: var(--rule); background: var(--surface-2); font-weight: 600; }
  .chip .swatch {
    width: 9px; height: 9px; border-radius: 2px;
    background: var(--c, var(--ink-muted));
    flex: none;
  }
  .chip[aria-pressed="false"] .swatch { opacity: 0.3; }
  .chip .n { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); }

  .spacer { flex: 1 1 auto; }
  select {
    font: inherit; font-size: 12.5px;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 9px;
  }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--surface); }
  .seg button {
    font: inherit; font-size: 12.5px;
    padding: 5px 13px;
    background: transparent;
    border: 0;
    color: var(--ink-2);
    cursor: pointer;
  }
  .seg button[aria-pressed="true"] { background: var(--surface-2); color: var(--ink); font-weight: 600; }

  /* ── 패널 ──────────────────────────────────────────── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-head {
    display: flex; align-items: baseline; gap: 12px;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  .panel-head h2 { margin: 0; font-size: 14px; font-weight: 640; letter-spacing: -0.01em; }
  .panel-head .sub { font-size: 12px; color: var(--ink-muted); }

  /* ── 타임라인 ──────────────────────────────────────── */
  .tl-scroll { overflow-x: auto; overflow-y: hidden; }
  .tl-inner { min-width: max-content; position: relative; }

  .tl-row { display: flex; align-items: stretch; }
  .tl-label {
    width: var(--label-w);
    flex: none;
    position: sticky;
    left: 0;
    z-index: 3;
    background: var(--surface);
    border-right: 1px solid var(--rule);
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tl-track { position: relative; flex: none; }

  /* 날짜 눈금 */
  .tl-head { border-bottom: 1px solid var(--rule); position: sticky; top: 0; z-index: 4; background: var(--surface); }
  .tl-head .tl-label { align-items: flex-end; padding-bottom: 6px; }
  .tl-head .tl-track { height: 46px; }
  .month {
    position: absolute; top: 6px;
    font-size: 11px; font-weight: 640; letter-spacing: 0.04em;
    color: var(--ink-2);
    padding-left: 4px;
    border-left: 1px solid var(--rule);
    line-height: 1;
  }
  .daynum {
    position: absolute; bottom: 6px;
    width: var(--day-w);
    text-align: center;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 10px;
    color: var(--ink-muted);
    line-height: 1;
  }
  .daynum.we { color: var(--rule); }

  /* 배경 격자 + 주말 밴드 */
  .band { position: absolute; top: 0; bottom: 0; background: var(--surface-2); opacity: 0.55; }
  .gridlines {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(to right, var(--grid) 0 1px, transparent 1px var(--day-w));
    pointer-events: none;
  }
  .today {
    position: absolute; top: 0; bottom: 0;
    width: 2px;
    background: var(--ink);
    opacity: 0.55;
    z-index: 2;
    pointer-events: none;
  }
  .today-tag {
    position: absolute; top: 4px;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 10px; font-weight: 650;
    background: var(--ink); color: var(--surface);
    padding: 1px 6px; border-radius: 999px;
    white-space: nowrap;
  }

  /* 경쟁사 구분 행 */
  .tl-group { border-top: 1px solid var(--rule); background: var(--surface-2); }
  .tl-group .tl-label { background: var(--surface-2); font-weight: 640; font-size: 12.5px; letter-spacing: -0.01em; }
  .tl-group .tl-track { height: 30px; }
  .tl-group .gcount { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); font-weight: 400; margin-left: auto; }

  /* 이벤트 행 */
  .tl-ev { border-top: 1px solid var(--grid); }
  .tl-ev:hover .tl-label, .tl-ev:hover .tl-track { background: var(--surface-2); }
  .tl-ev .tl-track { height: 32px; }
  .tl-title {
    font-size: 12.5px;
    color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tl-ev[data-status="ended"] .tl-title { color: var(--ink-2); }
  .dot { width: 9px; height: 9px; border-radius: 2px; flex: none; background: var(--c); }

  .bar {
    position: absolute;
    top: 7px; height: 18px;
    border-radius: 4px;
    background: color-mix(in oklab, var(--c) 24%, var(--surface));
    border: 1px solid color-mix(in oklab, var(--c) 62%, var(--surface));
    border-left: 3px solid var(--c);
    box-sizing: border-box;
    cursor: pointer;
    z-index: 1;
  }
  .bar:hover { background: color-mix(in oklab, var(--c) 40%, var(--surface)); }
  /* 종료일 미상 = 오른쪽 끝을 페이드시켜 "계속됨"으로 읽히게 한다. */
  .bar[data-open="true"] {
    border-right: 0;
    -webkit-mask-image: linear-gradient(to right, #000 calc(100% - 30px), transparent);
    mask-image: linear-gradient(to right, #000 calc(100% - 30px), transparent);
  }
  .bar[data-status="ended"] { opacity: 0.52; }
  .bar[data-status="upcoming"] { background: transparent; border-style: dashed; border-left: 3px solid var(--c); }

  .live-pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--good); flex: none;
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--good) 22%, transparent);
  }

  /* ── 툴팁 ──────────────────────────────────────────── */
  #tip {
    position: fixed;
    z-index: 50;
    max-width: 340px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 12px 14px;
    display: none;
    pointer-events: none;
  }
  #tip.on { display: block; }
  #tip h3 { margin: 0 0 2px; font-size: 13px; font-weight: 640; }
  #tip .dates { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); margin-bottom: 7px; }
  #tip p { margin: 0 0 8px; font-size: 12.5px; color: var(--ink-2); }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 11px; padding: 1px 7px; border-radius: 999px;
    background: var(--surface-2); color: var(--ink-2);
    border: 1px solid var(--border);
  }

  /* ── 표 ────────────────────────────────────────────── */
  .tblwrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th, td { text-align: left; padding: 9px 14px; border-bottom: 1px solid var(--grid); vertical-align: top; }
  th {
    font-size: 11px; font-weight: 650; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--ink-muted); white-space: nowrap;
    border-bottom: 1px solid var(--rule);
  }
  td.d { font-family: var(--mono); font-variant-numeric: tabular-nums; white-space: nowrap; color: var(--ink-2); }
  tbody tr:hover { background: var(--surface-2); }
  .status {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; white-space: nowrap;
  }

  /* ── 피드 ──────────────────────────────────────────── */
  .feed { display: flex; flex-direction: column; }
  .feed-item { display: flex; gap: 12px; padding: 11px 18px; border-bottom: 1px solid var(--grid); }
  .feed-item:last-child { border-bottom: 0; }
  .feed-date { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); flex: none; width: 78px; padding-top: 2px; }
  .feed-body { min-width: 0; }
  .feed-body .t { font-size: 13px; font-weight: 600; }
  .feed-body .s { font-size: 12.5px; color: var(--ink-2); }
  .srcs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .srcs a { font-size: 11px; font-family: var(--mono); color: var(--ink-muted); text-decoration: none; border-bottom: 1px solid var(--rule); }
  .srcs a:hover { color: var(--ink); }

  .empty { padding: 44px 24px; text-align: center; color: var(--ink-2); }
  .empty code { font-family: var(--mono); font-size: 12px; background: var(--surface-2); padding: 2px 6px; border-radius: 4px; }

  .hidden { display: none !important; }

  footer { font-size: 11.5px; color: var(--ink-muted); line-height: 1.7; }
  footer strong { color: var(--ink-2); font-weight: 600; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
  @media (max-width: 640px) {
    :root { --label-w: 180px; }
    .wrap { padding: 24px 14px 60px; }
  }
</style>

<div class="wrap">
  <header>
    <div class="eyebrow">경쟁사 인텔리전스</div>
    <h1>이벤트 · 프로모션 데일리 모니터</h1>
    <div class="meta" id="meta"></div>
  </header>

  <section class="stats" id="stats"></section>

  <div class="controls">
    <div class="chip-row" id="typefilters" style="display:contents"></div>
    <div class="spacer"></div>
    <select id="range" aria-label="표시 기간">
      <option value="30">최근 30일 + 예정</option>
      <option value="60" selected>최근 60일 + 예정</option>
      <option value="90">최근 90일 + 예정</option>
    </select>
    <div class="seg" role="group" aria-label="보기 방식">
      <button id="v-timeline" aria-pressed="true">타임라인</button>
      <button id="v-table" aria-pressed="false">표</button>
    </div>
  </div>

  <section class="panel" id="p-timeline">
    <div class="panel-head">
      <h2>진행 현황</h2>
      <span class="sub" id="tl-sub"></span>
    </div>
    <div class="tl-scroll" id="tl"></div>
  </section>

  <section class="panel hidden" id="p-table">
    <div class="panel-head"><h2>전체 이벤트</h2><span class="sub" id="tb-sub"></span></div>
    <div class="tblwrap"><table>
      <thead><tr>
        <th>경쟁사</th><th>유형</th><th>이벤트</th><th>시작</th><th>종료</th><th>상태</th><th>신뢰도</th><th>감지일</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table></div>
  </section>

  <section class="panel">
    <div class="panel-head"><h2>최근 감지</h2><span class="sub" id="fd-sub"></span></div>
    <div class="feed" id="feed"></div>
  </section>

  <footer id="foot"></footer>
</div>

<div id="tip" role="tooltip"></div>

<script>
  const DATA = /*__DATA__*/ null;

  const TYPES = [
    { key: "promo",     label: "과금 프로모션", c: "var(--s-promo)" },
    { key: "event",     label: "인게임 이벤트", c: "var(--s-event)" },
    { key: "update",    label: "업데이트",      c: "var(--s-update)" },
    { key: "collab",    label: "콜라보",        c: "var(--s-collab)" },
    { key: "marketing", label: "마케팅 · 미디어", c: "var(--s-marketing)" },
  ];
  const TYPE = Object.fromEntries(TYPES.map((t) => [t.key, t]));
  const CONF = { high: "높음", medium: "보통", low: "낮음" };

  const DAY = 86400000;
  const iso = (d) => d.toISOString().slice(0, 10);
  const parse = (s) => new Date(s + "T00:00:00Z");
  const addDays = (d, n) => new Date(d.getTime() + n * DAY);
  const diffDays = (a, b) => Math.round((b - a) / DAY);
  const esc = (s) =>
    String(s == null ? "" : s).replace(/[&<>"]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));

  const TODAY = parse(DATA.today);
  const state = { types: new Set(TYPES.map((t) => t.key)), range: 60, view: "timeline" };

  /* 상태는 오늘 기준으로 계산한다 — 저장 데이터에는 두지 않는다. */
  function statusOf(e) {
    const s = parse(e.starts_on);
    const t = e.ends_on ? parse(e.ends_on) : null;
    if (s > TODAY) return "upcoming";
    if (!t || t >= TODAY) return "live";
    return "ended";
  }

  const events = DATA.events
    .map((e) => ({ ...e, status: statusOf(e), competitor_name: DATA.competitors[e.competitor_id] || e.competitor_id }))
    .sort((a, b) => (a.starts_on < b.starts_on ? 1 : a.starts_on > b.starts_on ? -1 : 0));

  /* 기간 필터는 '끝난 이벤트'에만 적용한다 — 아직 진행 중이거나 예정인 건은
     시작일이 아무리 오래됐어도 현황에서 빠지면 안 된다. */
  const visible = () => {
    const cutoff = addDays(TODAY, -state.range);
    return events.filter(
      (e) => state.types.has(e.type) && (e.status !== "ended" || parse(e.ends_on) >= cutoff)
    );
  };

  /* ── 헤더 & 스탯 ── */
  function renderMeta() {
    const comps = Object.keys(DATA.competitors).length;
    document.getElementById("meta").innerHTML = [
      "최종 수집 " + esc(DATA.collected_at || DATA.today),
      "경쟁사 " + comps + "곳",
      "이벤트 " + events.length + "건",
    ]
      .map((s) => "<span>" + s + "</span>")
      .join("<span aria-hidden=\"true\">·</span>");
  }

  function renderStats() {
    const live = events.filter((e) => e.status === "live");
    const soon = events.filter((e) => e.status === "upcoming" && diffDays(TODAY, parse(e.starts_on)) <= 7);
    const newToday = events.filter((e) => e.detected_on === DATA.today);
    const tiles = [
      { v: live.length, k: "진행 중인 이벤트", n: "오늘 기준 라이브" },
      { v: live.filter((e) => e.type === "promo").length, k: "진행 중인 과금 프로모션", n: "유료 상품 · 패스" },
      { v: soon.length, k: "7일 내 시작 예정", n: "선제 대응 대상" },
      { v: newToday.length, k: "오늘 신규 감지", n: DATA.today },
    ];
    document.getElementById("stats").innerHTML = tiles
      .map(
        (t) =>
          '<div class="tile"><div class="tile-v">' +
          t.v +
          '</div><div class="tile-k">' +
          esc(t.k) +
          '</div><div class="tile-n">' +
          esc(t.n) +
          "</div></div>"
      )
      .join("");
  }

  /* ── 유형 필터 (범례 겸용) ── */
  function renderFilters() {
    const host = document.getElementById("typefilters");
    host.innerHTML = TYPES.map((t) => {
      const n = events.filter((e) => e.type === t.key).length;
      return (
        '<button class="chip" data-type="' +
        t.key +
        '" style="--c:' +
        t.c +
        '" aria-pressed="' +
        state.types.has(t.key) +
        '"><span class="swatch"></span>' +
        esc(t.label) +
        '<span class="n">' +
        n +
        "</span></button>"
      );
    }).join("");
    host.querySelectorAll("button").forEach((b) =>
      b.addEventListener("click", () => {
        const k = b.dataset.type;
        if (state.types.has(k) && state.types.size > 1) state.types.delete(k);
        else state.types.add(k);
        renderFilters();
        renderTimeline();
        renderTable();
      })
    );
  }

  /* ── 타임라인 ── */
  function renderTimeline() {
    const evs = visible();
    const host = document.getElementById("tl");
    document.getElementById("tl-sub").textContent =
      evs.length + "건 · 막대에 마우스를 올리면 상세";

    if (!evs.length) {
      host.innerHTML =
        '<div class="empty">표시할 이벤트가 없습니다.<br>필터를 넓히거나 <code>data/events.json</code> 에 항목을 추가하세요.</div>';
      return;
    }

    const start = addDays(TODAY, -state.range);
    let end = addDays(TODAY, 14);
    evs.forEach((e) => {
      const t = parse(e.ends_on || e.starts_on);
      if (t > end) end = t;
    });
    end = addDays(end, 3);
    const N = diffDays(start, end) + 1;
    const trackW = "calc(" + N + " * var(--day-w))";
    const at = (d) => "calc(" + diffDays(start, d) + " * var(--day-w))";

    /* 배경: 주말 밴드 + 격자 + 오늘 선 */
    let bg = '<div class="gridlines"></div>';
    for (let i = 0; i < N; i++) {
      const d = addDays(start, i);
      const dow = d.getUTCDay();
      if (dow === 0 || dow === 6)
        bg += '<div class="band" style="left:calc(' + i + ' * var(--day-w));width:var(--day-w)"></div>';
    }
    bg += '<div class="today" style="left:calc(' + diffDays(start, TODAY) + ' * var(--day-w) + var(--day-w) / 2)"></div>';

    /* 날짜 눈금 */
    let head = "";
    for (let i = 0; i < N; i++) {
      const d = addDays(start, i);
      const dow = d.getUTCDay();
      head +=
        '<div class="daynum' +
        (dow === 0 || dow === 6 ? " we" : "") +
        '" style="left:calc(' +
        i +
        ' * var(--day-w))">' +
        d.getUTCDate() +
        "</div>";
      if (d.getUTCDate() === 1 || i === 0)
        head +=
          '<div class="month" style="left:calc(' +
          i +
          ' * var(--day-w))">' +
          (d.getUTCMonth() + 1) +
          "월</div>";
    }
    head +=
      '<div class="today-tag" style="left:calc(' +
      diffDays(start, TODAY) +
      ' * var(--day-w) + var(--day-w) / 2)">오늘</div>';

    /* 경쟁사별 그룹 */
    const byComp = new Map();
    evs.forEach((e) => {
      if (!byComp.has(e.competitor_id)) byComp.set(e.competitor_id, []);
      byComp.get(e.competitor_id).push(e);
    });

    let rows = "";
    for (const [cid, list] of byComp) {
      const liveN = list.filter((e) => e.status === "live").length;
      rows +=
        '<div class="tl-row tl-group"><div class="tl-label">' +
        esc(list[0].competitor_name) +
        '<span class="gcount">' +
        list.length +
        "건 · 진행 " +
        liveN +
        '</span></div><div class="tl-track" style="width:' +
        trackW +
        '">' +
        bg +
        "</div></div>";

      list.forEach((e, idx) => {
        const s = parse(e.starts_on);
        const open = !e.ends_on;
        const t = open ? end : parse(e.ends_on);
        const from = s < start ? start : s;
        const len = Math.max(1, diffDays(from, t) + 1);
        rows +=
          '<div class="tl-row tl-ev" data-status="' +
          e.status +
          '"><div class="tl-label"><span class="dot" style="--c:' +
          TYPE[e.type].c +
          '"></span>' +
          (e.status === "live" ? '<span class="live-pip" title="진행 중"></span>' : "") +
          '<span class="tl-title" title="' +
          esc(e.title) +
          '">' +
          esc(e.title) +
          '</span></div><div class="tl-track" style="width:' +
          trackW +
          '">' +
          bg +
          '<div class="bar" data-i="' +
          events.indexOf(e) +
          '" data-status="' +
          e.status +
          '" data-open="' +
          open +
          '" style="--c:' +
          TYPE[e.type].c +
          ";left:" +
          at(from) +
          ";width:calc(" +
          len +
          ' * var(--day-w) - 2px)"></div></div></div>';
      });
    }

    host.innerHTML =
      '<div class="tl-inner"><div class="tl-row tl-head"><div class="tl-label"><span class="eyebrow">경쟁사 · 이벤트</span></div><div class="tl-track" style="width:' +
      trackW +
      '">' +
      head +
      "</div></div>" +
      rows +
      "</div>";

    host.querySelectorAll(".bar").forEach((b) => {
      b.addEventListener("mouseenter", (ev) => showTip(events[+b.dataset.i], ev));
      b.addEventListener("mousemove", moveTip);
      b.addEventListener("mouseleave", hideTip);
    });

    /* 오늘 위치가 보이도록 초기 스크롤 */
    host.scrollLeft = Math.max(0, (diffDays(start, TODAY) - 26) * 24);
  }

  /* ── 툴팁 ── */
  const tip = document.getElementById("tip");
  function showTip(e, ev) {
    const period = e.starts_on + " → " + (e.ends_on || "종료일 미상 · 진행 중");
    tip.innerHTML =
      "<h3>" +
      esc(e.title) +
      '</h3><div class="dates">' +
      esc(e.competitor_name) +
      "  ·  " +
      esc(period) +
      "</div><p>" +
      esc(e.summary) +
      '</p><div class="tags">' +
      (e.signals || []).map((s) => '<span class="tag">' + esc(s) + "</span>").join("") +
      '<span class="tag">신뢰도 ' +
      esc(CONF[e.confidence] || e.confidence) +
      "</span></div>";
    tip.classList.add("on");
    moveTip(ev);
  }
  function moveTip(ev) {
    const pad = 14;
    const r = tip.getBoundingClientRect();
    let x = ev.clientX + pad;
    let y = ev.clientY + pad;
    if (x + r.width > innerWidth - 8) x = ev.clientX - r.width - pad;
    if (y + r.height > innerHeight - 8) y = ev.clientY - r.height - pad;
    tip.style.left = Math.max(8, x) + "px";
    tip.style.top = Math.max(8, y) + "px";
  }
  function hideTip() {
    tip.classList.remove("on");
  }

  /* ── 표 ── */
  const STATUS_UI = {
    live: { t: "진행 중", c: "var(--good)" },
    upcoming: { t: "예정", c: "var(--warning)" },
    ended: { t: "종료", c: "var(--ink-muted)" },
  };
  function renderTable() {
    const evs = visible();
    document.getElementById("tb-sub").textContent = evs.length + "건";
    document.getElementById("tbody").innerHTML = evs
      .map((e) => {
        const st = STATUS_UI[e.status];
        return (
          "<tr><td>" +
          esc(e.competitor_name) +
          '</td><td><span class="status"><span class="dot" style="--c:' +
          TYPE[e.type].c +
          '"></span>' +
          esc(TYPE[e.type].label) +
          "</span></td><td>" +
          esc(e.title) +
          '</td><td class="d">' +
          esc(e.starts_on) +
          '</td><td class="d">' +
          esc(e.ends_on || "—") +
          '</td><td><span class="status"><span class="dot" style="border-radius:50%;--c:' +
          st.c +
          '"></span>' +
          st.t +
          "</span></td><td>" +
          esc(CONF[e.confidence] || e.confidence) +
          '</td><td class="d">' +
          esc(e.detected_on) +
          "</td></tr>"
        );
      })
      .join("");
  }

  /* ── 최근 감지 피드 ── */
  function renderFeed() {
    const recent = [...events]
      .sort((a, b) => (a.detected_on < b.detected_on ? 1 : -1))
      .slice(0, 12);
    document.getElementById("fd-sub").textContent = "최신 " + recent.length + "건";
    document.getElementById("feed").innerHTML = recent
      .map(
        (e) =>
          '<div class="feed-item"><div class="feed-date">' +
          esc(e.detected_on) +
          '</div><div class="feed-body"><div class="t"><span class="dot" style="--c:' +
          TYPE[e.type].c +
          ';display:inline-block;vertical-align:middle;margin-right:6px"></span>' +
          esc(e.competitor_name) +
          " — " +
          esc(e.title) +
          '</div><div class="s">' +
          esc(e.summary) +
          '</div><div class="srcs">' +
          (e.evidence || [])
            .map((v) => '<a href="' + esc(v.url) + '" target="_blank" rel="noopener">' + esc(v.source) + " ↗</a>")
            .join("") +
          "</div></div></div>"
      )
      .join("");
  }

  /* ── 컨트롤 배선 ── */
  document.getElementById("range").addEventListener("change", (e) => {
    state.range = +e.target.value;
    renderTimeline();
    renderTable();
  });
  const vT = document.getElementById("v-timeline");
  const vB = document.getElementById("v-table");
  function setView(v, push) {
    state.view = v;
    vT.setAttribute("aria-pressed", String(v === "timeline"));
    vB.setAttribute("aria-pressed", String(v === "table"));
    document.getElementById("p-timeline").classList.toggle("hidden", v !== "timeline");
    document.getElementById("p-table").classList.toggle("hidden", v !== "table");
    // 보기 상태를 해시에 남겨 링크로 바로 열 수 있게 한다.
    if (push) history.replaceState(null, "", v === "table" ? "#table" : "#timeline");
  }
  vT.addEventListener("click", () => setView("timeline", true));
  vB.addEventListener("click", () => setView("table", true));

  document.getElementById("foot").innerHTML =
    "<strong>수집 자동화:</strong> App Store 릴리스 노트 · Google Play 릴리스 노트 · 공식 유튜브 · RSS · 공지 게시판. " +
    "<strong>수동 확인 필요:</strong> Meta/TikTok 광고 라이브러리, 인게임 배너 — 공개 API가 없어 자동 수집 대상이 아닙니다.<br>" +
    "이벤트 상태(진행 중 / 예정 / 종료)는 저장하지 않고 열람 시점 날짜로 계산합니다. 종료일이 없는 항목은 막대 오른쪽 끝을 점선으로 표시합니다.";

  renderMeta();
  renderStats();
  renderFilters();
  renderTimeline();
  renderTable();
  renderFeed();
  setView(location.hash === "#table" ? "table" : "timeline");
</script>
